<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
  <!-- ===== 实心单色图标（参考截图风格） ===== -->

  <!-- 发送（实心纸飞机，带轻微倾斜） -->
  <symbol id="i-send" viewBox="0 0 24 24">
    <path d="M2.5 11.5 L21 3 L18.5 21.5 L13.5 13.5 Z" fill="currentColor"/>
    <path d="M13.5 13.5 L21 3" stroke="white" stroke-width="1" fill="none" opacity="0.3"/>
  </symbol>

  <!-- 表情（笑脸实心） -->
  <symbol id="i-smile" viewBox="0 0 24 24">
    <path d="M12 2 C6.5 2 2.5 6.2 2.5 11.5 C2.5 16.8 6.5 22 12 22 C17.5 22 21.5 16.8 21.5 11.5 C21.5 6.2 17.5 2 12 2 Z" fill="currentColor"/>
    <circle cx="8.5" cy="10" r="1.5" fill="white"/>
    <circle cx="15.5" cy="10" r="1.5" fill="white"/>
    <path d="M7.5 13.5 C8.3 16 10 17.8 12 17.8 C14 17.8 15.7 16 16.5 13.5 C14.5 14.5 13.2 15 12 15 C10.8 15 9.5 14.5 7.5 13.5 Z" fill="white"/>
  </symbol>

  <!-- 加号（实心圆 + 白+） -->
  <symbol id="i-plus" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="currentColor"/>
    <rect x="11" y="6.5" width="2" height="11" rx="1" fill="white"/>
    <rect x="6.5" y="11" width="11" height="2" rx="1" fill="white"/>
  </symbol>

  <!-- 设置（实心齿轮，齿轮感强） -->
  <symbol id="i-gear" viewBox="0 0 24 24">
    <path d="M12 2.5 L13 5.5 L16 4.5 L16.8 7.3 L19.5 7 L20 10 L22.5 11 L21 13.5 L22.5 16 L20 17 L19.5 20 L16.8 19.7 L16 22.5 L13 21.5 L12 22.5 L11 21.5 L8 22.5 L7.2 19.7 L4.5 20 L4 17 L1.5 16 L3 13.5 L1.5 11 L4 10 L4.5 7 L7.2 7.3 L8 4.5 L11 5.5 Z" fill="currentColor"/>
    <circle cx="12" cy="12" r="4" fill="white"/>
    <circle cx="12" cy="12" r="2" fill="currentColor"/>
  </symbol>

  <!-- 图片（实心相框+山形） -->
  <symbol id="i-image" viewBox="0 0 24 24">
    <path d="M3 5 C3 3.9 3.9 3 5 3 L19 3 C20.1 3 21 3.9 21 5 L21 19 C21 20.1 20.1 21 19 21 L5 21 C3.9 21 3 20.1 3 19 Z" fill="currentColor"/>
    <circle cx="8" cy="9" r="1.8" fill="white"/>
    <path d="M3 19 L3 17.5 L8 12.5 L13 17.5 L16.5 14 L21 18.5 L21 19 Z" fill="white"/>
  </symbol>

  <!-- 关闭（实心圆+白X） -->
  <symbol id="i-close" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="currentColor"/>
    <path d="M8.5 8.5 L15.5 15.5 M15.5 8.5 L8.5 15.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </symbol>

  <!-- 关闭（线描 X，无背景，用于嵌入位置） -->
  <symbol id="i-x" viewBox="0 0 24 24">
    <path d="M6 6 L18 18 M18 6 L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- 眼睛（实心眼睛，镂空瞳孔） -->
  <symbol id="i-eye" viewBox="0 0 24 24">
    <path d="M12 5 C7 5 3.5 7.5 1 12 C3.5 16.5 7 19 12 19 C17 19 20.5 16.5 23 12 C20.5 7.5 17 5 12 5 Z" fill="currentColor"/>
    <ellipse cx="12" cy="12" rx="4" ry="3.5" fill="white"/>
    <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
  </symbol>

  <symbol id="i-eye-off" viewBox="0 0 24 24">
    <path d="M12 5 C7 5 3.5 7.5 1 12 C3.5 16.5 7 19 12 19 C17 19 20.5 16.5 23 12 C20.5 7.5 17 5 12 5 Z" fill="currentColor"/>
    <path d="M3 3 L21 21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </symbol>

  <!-- 刷新（实心弧形箭头） -->
  <symbol id="i-refresh" viewBox="0 0 24 24">
    <path d="M12 3 C7 3 3 7 3 12 L6 12 C6 8.7 8.7 6 12 6 C14 6 15.8 7 17 8.5 L14.5 11 L22 11 L22 3.5 L19.5 6 C17.8 4.2 15 3 12 3 Z" fill="currentColor"/>
    <path d="M21 12 C21 15.3 18.3 18 15 18 C13 18 11.2 17 10 15.5 L12.5 13 L5 13 L5 20.5 L7.5 18 C9.2 19.8 12 21 15 21 C20 21 24 17 24 12 Z" fill="currentColor"/>
  </symbol>

  <!-- 复制（实心双层叠片） -->
  <symbol id="i-copy" viewBox="0 0 24 24">
    <path d="M8 3 L17 3 C18.1 3 19 3.9 19 5 L19 8 L21 8 L21 19 C21 20.1 20.1 21 19 21 L8 21 C6.9 21 6 20.1 6 19 L6 5 C6 3.9 6.9 3 8 3 Z" fill="currentColor"/>
    <path d="M19 5 L19 8 L17 8 C15.9 8 15 8.9 15 10 L15 16 L9 16 C7.9 16 7 16.9 7 18 L7 19 C7 19 8 19 9 19 L19 19 Z" fill="white" opacity="0.4"/>
  </symbol>

  <!-- 导出（实心箭头出盒） -->
  <symbol id="i-export" viewBox="0 0 24 24">
    <path d="M12 3 L7 8 L9.5 8 L9.5 14 L14.5 14 L14.5 8 L17 8 Z" fill="currentColor"/>
    <path d="M3 14 L3 19 C3 20.1 3.9 21 5 21 L19 21 C20.1 21 21 20.1 21 19 L21 14 L18 14 L18 18 L6 18 L6 14 Z" fill="currentColor"/>
  </symbol>

  <!-- 导入（实心箭头入盒） -->
  <symbol id="i-import" viewBox="0 0 24 24">
    <path d="M9.5 3 L9.5 9 L7 9 L12 14 L17 9 L14.5 9 L14.5 3 Z" fill="currentColor"/>
    <path d="M3 14 L3 19 C3 20.1 3.9 21 5 21 L19 21 C20.1 21 21 20.1 21 19 L21 14 L18 14 L18 18 L6 18 L6 14 Z" fill="currentColor"/>
  </symbol>

  <!-- 垃圾桶（实心+斜杠盖） -->
  <symbol id="i-trash" viewBox="0 0 24 24">
    <path d="M9 3 L9 4 L5 4 L5 6 L19 6 L19 4 L15 4 L15 3 Z" fill="currentColor"/>
    <path d="M6 7 L7 19 C7.1 20.2 8 21 9 21 L15 21 C16 21 16.9 20.2 17 19 L18 7 Z" fill="currentColor"/>
    <line x1="10" y1="11" x2="10" y2="17" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14" y1="11" x2="14" y2="17" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <!-- 保存（实心存档盒） -->
  <symbol id="i-save" viewBox="0 0 24 24">
    <path d="M4 5 L4 19 C4 20.1 4.9 21 6 21 L18 21 C19.1 21 20 20.1 20 19 L20 8 L15 3 L6 3 C4.9 3 4 3.9 4 5 Z" fill="currentColor"/>
    <rect x="7" y="3" width="6" height="6" fill="white"/>
    <rect x="7" y="13" width="10" height="8" rx="1" fill="white"/>
    <circle cx="12" cy="17" r="1.5" fill="currentColor"/>
  </symbol>

  <!-- 外部链接（实心右上箭头） -->
  <symbol id="i-external" viewBox="0 0 24 24">
    <path d="M14 4 L19 4 C20.1 4 21 4.9 21 6 L21 11 L18 11 L18 7.5 L11.5 14 L9 11.5 L15.5 5 L12 5 Z" fill="currentColor"/>
    <path d="M5 4 L11 4 L11 7 L8 7 L8 16 L17 16 L17 13 L20 13 L20 19 C20 20.1 19.1 21 18 21 L5 21 C3.9 21 3 20.1 3 19 L3 6 C3 4.9 3.9 4 5 4 Z" fill="currentColor"/>
  </symbol>

  <!-- 显示眼睛 -->
  <symbol id="i-view" viewBox="0 0 24 24">
    <path d="M12 5 C7 5 3.5 7.5 1 12 C3.5 16.5 7 19 12 19 C17 19 20.5 16.5 23 12 C20.5 7.5 17 5 12 5 Z" fill="currentColor"/>
    <ellipse cx="12" cy="12" rx="4" ry="3.5" fill="white"/>
    <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
  </symbol>

  <!-- 手机（实心带屏） -->
  <symbol id="i-phone" viewBox="0 0 24 24">
    <path d="M6 2.5 L18 2.5 C19.1 2.5 20 3.4 20 4.5 L20 21.5 C20 22.6 19.1 22.5 18 22.5 L6 22.5 C4.9 22.5 4 22.6 4 21.5 L4 4.5 C4 3.4 4.9 2.5 6 2.5 Z" fill="currentColor"/>
    <rect x="6.5" y="4.5" width="11" height="14" rx="1" fill="white"/>
    <circle cx="12" cy="20" r="0.8" fill="white"/>
  </symbol>

  <!-- 小狗（实心脚印，几何感强） -->
  <symbol id="i-paw" viewBox="0 0 24 24">
    <ellipse cx="12" cy="17" rx="5" ry="4.5" fill="currentColor"/>
    <ellipse cx="5.5" cy="10" rx="2.5" ry="3.2" fill="currentColor"/>
    <ellipse cx="18.5" cy="10" rx="2.5" ry="3.2" fill="currentColor"/>
    <ellipse cx="9" cy="5" rx="2" ry="2.8" fill="currentColor"/>
    <ellipse cx="15" cy="5" rx="2" ry="2.8" fill="currentColor"/>
  </symbol>

  <!-- 盾牌（实心+白色对勾） -->
  <symbol id="i-shield" viewBox="0 0 24 24">
    <path d="M12 2.5 L20 5.5 L20 12 C20 16.5 16.5 20.5 12 22 C7.5 20.5 4 16.5 4 12 L4 5.5 Z" fill="currentColor"/>
    <path d="M8.5 12 L11 14.5 L16 9.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </symbol>

  <!-- 链接（实心链节） -->
  <symbol id="i-link" viewBox="0 0 24 24">
    <path d="M9 7 L11 5 C13 3 16 3 18 5 L19 6 C21 8 21 11 19 13 L17 15 L14.5 12.5 L16.5 10.5 C17 10 17 9 16.5 8.5 L16 8 C15.5 7.5 14.5 7.5 14 8 L12 10 Z" fill="currentColor"/>
    <path d="M15 17 L13 19 C11 21 8 21 6 19 L5 18 C3 16 3 13 5 11 L7 9 L9.5 11.5 L7.5 13.5 C7 14 7 15 7.5 15.5 L8 16 C8.5 16.5 9.5 16.5 10 16 L12 14 Z" fill="currentColor"/>
    <rect x="9" y="11" width="6" height="2" transform="rotate(45 12 12)" fill="currentColor"/>
  </symbol>

  <!-- ===== 加号菜单图标（实心风格） ===== -->

  <!-- 游戏手柄（实心） -->
  <symbol id="i-game" viewBox="0 0 24 24">
    <path d="M5 7 L19 7 C21 7 23 9 23 11.5 L23 13.5 C23 16 21.5 18 19 18 L17.5 18 L15.5 16 L8.5 16 L6.5 18 L5 18 C2.5 18 1 16 1 13.5 L1 11.5 C1 9 3 7 5 7 Z" fill="currentColor"/>
    <rect x="3" y="11" width="6" height="2" fill="white"/>
    <rect x="5" y="9" width="2" height="6" fill="white"/>
    <circle cx="16" cy="11" r="1.2" fill="white"/>
    <circle cx="18.5" cy="13.5" r="1.2" fill="white"/>
  </symbol>

  <!-- 转账（钱币+箭头） -->
  <symbol id="i-transfer" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="currentColor"/>
    <text x="12" y="16" font-size="11" font-weight="700" fill="white" text-anchor="middle" font-family="serif">¥</text>
  </symbol>

  <!-- 麦克风（实心） -->
  <symbol id="i-mic" viewBox="0 0 24 24">
    <path d="M9 2.5 L15 2.5 C16.1 2.5 17 3.4 17 4.5 L17 12 C17 13.1 16.1 14 15 14 L9 14 C7.9 14 7 13.1 7 12 L7 4.5 C7 3.4 7.9 2.5 9 2.5 Z" fill="currentColor"/>
    <path d="M4 12 C4 16.4 7.6 20 12 20 C16.4 20 20 16.4 20 12 L17.5 12 C17.5 14.8 15 17 12 17 C9 17 6.5 14.8 6.5 12 Z" fill="currentColor"/>
    <rect x="11" y="20" width="2" height="3" fill="currentColor"/>
    <rect x="8" y="22.5" width="8" height="1.5" rx="0.5" fill="currentColor"/>
  </symbol>

  <!-- 电话（实心话筒） -->
  <symbol id="i-call" viewBox="0 0 24 24">
    <path d="M5 3 L9 3 C10 3 10.8 3.5 11 4.5 L12 9 C12.1 9.8 11.7 10.5 11 11 L9 12.5 C10 15 12 17 14.5 18 L16 16 C16.5 15.3 17.2 14.9 18 15 L22.5 16 C23.5 16.2 24 17 24 18 L24 21 C24 22.1 23.1 23 22 23 C12 23 1 12 1 2 C1 0.9 1.9 0 3 0 Z" fill="currentColor"/>
  </symbol>

  <!-- 相机（实心带镜头） -->
  <symbol id="i-camera" viewBox="0 0 24 24">
    <path d="M3 7 L7 7 L8.5 4.5 L15.5 4.5 L17 7 L21 7 C22.1 7 23 7.9 23 9 L23 19 C23 20.1 22.1 21 21 21 L3 21 C1.9 21 1 20.1 1 19 L1 9 C1 7.9 1.9 7 3 7 Z" fill="currentColor"/>
    <circle cx="12" cy="13.5" r="4.5" fill="white"/>
    <circle cx="12" cy="13.5" r="2.8" fill="currentColor"/>
    <circle cx="19" cy="10" r="0.8" fill="white"/>
  </symbol>

  <!-- 文件（实心带折角） -->
  <symbol id="i-file" viewBox="0 0 24 24">
    <path d="M5 3 L14 3 L19 8 L19 19 C19 20.1 18.1 21 17 21 L5 21 C3.9 21 3 20.1 3 19 L3 5 C3 3.9 3.9 3 5 3 Z" fill="currentColor"/>
    <path d="M14 3 L14 8 L19 8 Z" fill="white" opacity="0.4"/>
    <rect x="6" y="12" width="10" height="1.5" rx="0.5" fill="white"/>
    <rect x="6" y="15" width="8" height="1.5" rx="0.5" fill="white"/>
    <rect x="6" y="18" width="6" height="1.5" rx="0.5" fill="white"/>
  </symbol>

  <!-- 位置（实心水滴） -->
  <symbol id="i-location" viewBox="0 0 24 24">
    <path d="M12 2 C7.5 2 4 5.5 4 10 C4 16 12 22 12 22 C12 22 20 16 20 10 C20 5.5 16.5 2 12 2 Z" fill="currentColor"/>
    <circle cx="12" cy="10" r="3.5" fill="white"/>
  </symbol>

  <!-- 三角箭头（右） -->
  <symbol id="i-chevron-right" viewBox="0 0 24 24">
    <path d="M9 5 L17 12 L9 19 Z" fill="currentColor"/>
  </symbol>
</svg>